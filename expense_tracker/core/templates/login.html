{% extends 'base.html' %}
{% block content %}

<h2>Login</h2>
{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}
<form method="POST">
{% csrf_token %}
<input name="username" placeholder="Username" required>
<input name="password" type="password" required>
<button>Login</button>
</form>

<a href="/register/">Register</a>

{% endblock %}
